{% extends "layout_public.html" %}
{% block title %}Admin login — LLDAP Self-Service{% endblock %}
{% block content %}
<article>
  <header>
    <h1>Community admin login</h1>
    <p class="muted">Sign in with your LDAP username and password.</p>
  </header>
  {% if let Some(err) = error %}
  <p class="flash error" role="alert">{{ err }}</p>
  {% endif %}
  <form method="post" action="/admin/login">
    <label>
      Username
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      Password
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
</article>
{% endblock %}
