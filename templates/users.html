{% extends "layout_admin.html" %}
{% block title %}Users — LLDAP Self-Service{% endblock %}
{% block content %}
{% if let Some(f) = flash %}
<p class="flash {{ f.kind }}" role="status">{{ f.text }}</p>
{% endif %}

<article>
  <header>
    <h1>Users</h1>
  </header>
  <form method="get" action="/admin/users" class="grid">
    <label>
      Search
      <input name="q" type="search" value="{{ search }}" placeholder="uid, email, or name">
    </label>
    <button type="submit">Search</button>
  </form>
</article>

<article>
  <figure>
    <table role="grid">
      <thead>
        <tr>
          <th scope="col">Username</th>
          <th scope="col">Email</th>
          <th scope="col">Display name</th>
          {% if can_reset_pwd %}<th scope="col">Reset password</th>{% endif %}
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td><strong>{{ u.id }}</strong></td>
          <td>{{ u.email }}</td>
          <td>{{ u.display_name }}</td>
          {% if can_reset_pwd %}
          <td>
            <details>
              <summary>Set new password</summary>
              <form method="post" action="/api/users/{{ u.id }}/reset-password">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label>
                  New password
                  <input name="password" type="password" required minlength="8">
                </label>
                <label>
                  Confirm
                  <input name="password_confirm" type="password" required minlength="8">
                </label>
                <button type="submit" class="secondary">Reset</button>
              </form>
            </details>
          </td>
          {% endif %}
        </tr>
        {% else %}
        <tr><td colspan="{% if can_reset_pwd %}4{% else %}3{% endif %}" class="muted">No users found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </figure>
</article>
{% endblock %}
